name: Sync vlm-object-detection → HF
on:
  push:
    branches: [main]
    paths: ['vlm-object-detection/**', '.github/workflows/sync-vlm-object-detection.yml']

jobs:
  sync:
    uses: ./.github/workflows/_sync-folder.yml
    with:
      folder: vlm-object-detection
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
